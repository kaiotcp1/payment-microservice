name: Deploy Lambda

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  id-token: write

concurrency:
  group: payment-ms-main-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  NODE_VERSION: "22"
  TF_WORKING_DIR: terraform
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_app_name: ${{ vars.TF_APP_NAME || 'payment-ms' }}
  TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}
  TF_VAR_cost_center: ${{ vars.TF_COST_CENTER || 'engineering' }}
  TF_VAR_log_retention_days: ${{ vars.TF_LOG_RETENTION_DAYS || '7' }}

jobs:
  deploy:
    name: Build, zip and apply Terraform
    if: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feature/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Typecheck Lambda
        working-directory: api
        run: npm run typecheck

      - name: Build Lambda bundle
        working-directory: api
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check deployment configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "${AWS_ROLE_TO_ASSUME}" ]; then
            echo "::error::Configure the repository secret AWS_ROLE_TO_ASSUME with the IAM role ARN used by GitHub OIDC."
            exit 1
          fi

          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "::error::Configure the repository variable TF_STATE_BUCKET with the S3 bucket used for Terraform state."
            exit 1
          fi

          if [ -z "${TF_STATE_KEY}" ]; then
            echo "TF_STATE_KEY=${TF_VAR_app_name}/${TF_VAR_environment}/terraform.tfstate" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Terraform formatting
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Init Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          backend_args=(
            "-backend-config=bucket=${TF_STATE_BUCKET}"
            "-backend-config=key=${TF_STATE_KEY}"
            "-backend-config=region=${AWS_REGION}"
            "-backend-config=encrypt=true"
          )

          if [ -n "${TF_LOCK_TABLE}" ]; then
            backend_args+=("-backend-config=dynamodb_table=${TF_LOCK_TABLE}")
          fi

          terraform init -input=false "${backend_args[@]}"

      - name: Validate Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Plan Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Upload Lambda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-producer-zip
          path: dist/payment-producer.zip
          if-no-files-found: error

      - name: Apply Terraform
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false tfplan
